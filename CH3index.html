                      ${activeTab === chapter.id 
                        ? 'bg-cyan-950/60 text-cyan-300 border-cyan-700/80 shadow-[0_0_20px_rgba(6,182,212,0.15)] scale-[1.02]' 
                        : 'bg-slate-900/50 text-slate-400 border-slate-800/60 hover:bg-slate-800 hover:text-slate-200 hover:border-slate-700'
                      }`}
                  >
                    {chapter.title}
                  </button>
                ))}
              </nav>
            </aside>

            {isSidebarOpen && (
              <div 
                className="absolute inset-0 bg-black/60 backdrop-blur-sm z-0 lg:hidden transition-opacity duration-500"
                onClick={() => setIsSidebarOpen(false)}
              />
            )}

            <main className="flex-1 overflow-y-auto p-6 md:p-12 relative z-0 bg-[#070b14] scroll-smooth">
              <div className="max-w-4xl mx-auto pb-24 transition-all duration-500">
                
                <div className="mb-12 border-l-[6px] border-cyan-500 pl-8 bg-gradient-to-r from-cyan-950/40 via-cyan-950/10 to-transparent py-8 pr-6 rounded-r-2xl shadow-sm">
                  <h2 className="text-3xl md:text-4xl font-black text-white mb-5 tracking-wide">{activeContent.title}</h2>
                  <p className="text-slate-300 leading-relaxed text-base md:text-lg font-light tracking-wide">
                    {activeContent.summary}
                  </p>
                </div>

                <div className="space-y-10">
                  {activeContent.sections.map((sec, idx) => (
                    <section key={idx} className="bg-slate-900/40 border border-slate-800/60 rounded-2xl p-6 md:p-10 transition-colors duration-300 hover:bg-slate-900/60 shadow-lg shadow-black/20">
                      <h3 className="text-xl md:text-[1.4rem] font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-400 mb-6 pb-4 border-b border-slate-700/50 tracking-wide flex items-center">
                        <span className="w-1.5 h-6 bg-cyan-500 mr-4 rounded-full inline-block shadow-[0_0_10px_rgba(6,182,212,0.8)]"></span>
                        {sec.heading}
                      </h3>
                      <div className="text-slate-200/95 leading-[1.85] text-base md:text-[1.1rem] tracking-wide whitespace-pre-wrap font-light">
                        {sec.content}
                      </div>
                      
                      {sec.images && sec.images.length > 0 && (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-10">
                          {sec.images.map((img, i) => (
                            <figure key={i} className="bg-slate-900/80 p-5 rounded-2xl border border-slate-700/60 shadow-xl flex flex-col h-full transition-all duration-300 hover:shadow-cyan-900/20 hover:border-slate-600 group">
                              <div className="w-full h-72 flex items-center justify-center bg-slate-950/80 rounded-xl mb-5 overflow-hidden shadow-inner border border-slate-800/80">
                                <img 
                                  src={`https://raw.githubusercontent.com/jimmymochi/seismology_ch3/main/seismology_ch3/figures_extracted_hq_3.5/${encodeURIComponent(img.src)}`}
                                  alt={img.alt} 
                                  className="max-w-full max-h-full object-contain p-2 group-hover:scale-[1.03] transition-transform duration-500 ease-out" 
                                  loading="lazy" 
                                />
                              </div>
                              <figcaption className="text-[0.95rem] text-slate-300/90 leading-relaxed mt-auto border-t border-slate-700/50 pt-4 font-normal tracking-wide">
                                {img.desc}
                              </figcaption>
                            </figure>
                          ))}
                        </div>
                      )}
                    </section>
                  ))}
                </div>

                {activeContent.simulations && activeContent.simulations.length > 0 && (
                  <div className="mt-16 pt-10 border-t border-slate-800/80">
                    <h4 className="text-amber-400/90 text-2xl font-bold uppercase tracking-widest mb-10 flex items-center drop-shadow-sm">
                      <svg className="w-8 h-8 mr-4 drop-shadow-md text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                      </svg>
                      互動教學動態模擬區
                    </h4>
                    <div className="grid grid-cols-1 gap-8">
                      {activeContent.simulations.map(simId => renderSimulation(simId))}
                    </div>
                  </div>
                )}

                <div className="mt-16 pt-8 border-t border-slate-800/80 bg-gradient-to-r from-slate-900/50 to-slate-900/20 p-8 rounded-2xl shadow-inner border border-slate-800/50">
                  <h4 className="text-slate-400 text-sm font-bold uppercase tracking-widest mb-4 flex items-center">
                    <span className="w-1.5 h-4 bg-slate-500 mr-3 rounded-full inline-block"></span>
                    章節總結
                  </h4>
                  <p className="text-slate-300/90 text-base md:text-[1.05rem] leading-[1.8] italic tracking-wide">
                    {activeContent.conclusion}
                  </p>
                </div>
                
              </div>
            </main>

          </div>
        </div>
      );
    }

    // 將 App 元件渲染至根節點
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
