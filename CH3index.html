    const Sim31B = () => {

          <input type="range" min="1" max="10" value={rays} onChange={(e) => setRays(Number(e.target.value))} className="w-full mb-6 accent-cyan-500 cursor-pointer" />

    };

    const Sim32A = () => {
      const [distance, setDistance] = useState(150);
      const depth = 40, maxDistance = 300, xc = depth * Math.tan(Math.asin(3/5));
      const hasHeadWave = distance >= 2 * xc;
      return (
        <div className="bg-slate-900 p-5 md:p-6 rounded-xl border border-slate-700/50 my-6 shadow-lg transition-all duration-300 hover:shadow-cyan-900/10">
          <h3 className="text-xl font-bold text-amber-400 mb-3 tracking-wide">模擬 3.2-A：平坦層狀折射波傳</h3>
          <p className="text-[1.05rem] leading-relaxed text-slate-300 mb-5">觀察直達波(黃)、反射波(藍)與折射頭波(紅)幾何路徑。當前距離: <span className="font-mono text-cyan-300">{distance} km</span></p>
          <input type="range" min="10" max={maxDistance} value={distance} onChange={(e) => setDistance(Number(e.target.value))} className="w-full mb-6 accent-cyan-500 cursor-pointer" />
          <svg viewBox={`0 0 ${maxDistance} 100`} className="w-full h-32 md:h-40 bg-slate-800 rounded-lg shadow-inner border border-slate-700/50">
            <rect x="0" y="0" width={maxDistance} height={depth} fill="#1e293b" />
            <rect x="0" y={depth} width={maxDistance} height={100-depth} fill="#0f172a" />
            <line x1="0" y1={depth} x2={maxDistance} y2={depth} stroke="#475569" strokeDasharray="4" />
            <circle cx="5" cy="5" r="3" fill="#f87171" /><circle cx={distance} cy="5" r="3" fill="#38bdf8" />
            <line x1="5" y1="5" x2={distance} y2="5" stroke="#fbbf24" strokeWidth="2" />
            <polyline points={`5,5 ${distance/2},${depth} ${distance},5`} fill="none" stroke="#60a5fa" strokeWidth="2" />
            {hasHeadWave && <polyline points={`5,5 ${xc},${depth} ${distance-xc},${depth} ${distance},5`} fill="none" stroke="#f43f5e" strokeWidth="2" strokeDasharray="3" />}
          </svg>
        </div>
      );
    };

    const Sim32B = () => {
      const [dip, setDip] = useState(10);
      return (
        <div className="bg-slate-900 p-5 md:p-6 rounded-xl border border-slate-700/50 my-6 shadow-lg transition-all duration-300 hover:shadow-cyan-900/10">
          <h3 className="text-xl font-bold text-amber-400 mb-3 tracking-wide">模擬 3.2-B：傾斜地層 (Dipping Layer)</h3>
          <p className="text-[1.05rem] leading-relaxed text-slate-300 mb-5">傾角 θ 影響視速度。順傾(Down-dip)視速度變慢，逆傾(Up-dip)視速度變快。傾角: <span className="font-mono text-cyan-300">{dip}°</span></p>
          <input type="range" min="0" max="25" value={dip} onChange={(e) => setDip(Number(e.target.value))} className="w-full mb-6 accent-cyan-500 cursor-pointer" />
          <svg viewBox="0 0 300 100" className="w-full h-32 md:h-40 bg-slate-800 rounded-lg shadow-inner border border-slate-700/50">
            <polygon points={`0,0 300,0 300,${50 + dip*2} 0,50`} fill="#1e293b" className="transition-all duration-300" />
            <polygon points={`0,50 300,${50 + dip*2} 300,100 0,100`} fill="#0f172a" className="transition-all duration-300" />
            <line x1="0" y1="50" x2="300" y2={50 + dip*2} stroke="#f43f5e" strokeWidth="2.5" strokeDasharray="4" className="transition-all duration-300" />
            <text x="10" y="20" fill="#fbbf24" fontSize="12" fontWeight="bold">順傾 (Down-dip) →</text>
            <text x="190" y="20" fill="#60a5fa" fontSize="12" fontWeight="bold">← 逆傾 (Up-dip)</text>
          </svg>
        </div>
      );
    };

    const Sim33A = () => {
      const [vel, setVel] = useState(2000);
      const t0 = 20;
      const generateCurve = () => Array.from({length: 40}).map((_, i) => {
        const x = i * 10;
        const t = Math.sqrt(t0*t0 + (x*x)/(vel/100)*(vel/100));
        return `${x},${t+10}`;
      }).join(' ');
      return (
        <div className="bg-slate-900 p-5 md:p-6 rounded-xl border border-slate-700/50 my-6 shadow-lg transition-all duration-300 hover:shadow-cyan-900/10">
          <h3 className="text-xl font-bold text-amber-400 mb-3 tracking-wide">模擬 3.3-A：反射波正常時差 (NMO)</h3>
          <p className="text-[1.05rem] leading-relaxed text-slate-300 mb-5">波速越快，走時雙曲線越平坦。地層波速: <span className="font-mono text-cyan-300">{vel} m/s</span></p>
          <input type="range" min="1500" max="4000" value={vel} onChange={(e) => setVel(Number(e.target.value))} className="w-full mb-6 accent-cyan-500 cursor-pointer" />
          <svg viewBox="0 0 400 100" className="w-full h-32 md:h-40 bg-slate-800 rounded-lg shadow-inner border border-slate-700/50">
            <line x1="0" y1="10" x2="400" y2="10" stroke="#475569" strokeWidth="2" />
            <text x="5" y="8" fill="#94a3b8" fontSize="10">Offset (x)</text>
            <polyline points={generateCurve()} fill="none" stroke="#06b6d4" strokeWidth="3" className="transition-all duration-300" />
          </svg>
        </div>
      );
    };

    const Sim33B = () => {
      const [strength, setStrength] = useState(0);
      return (
        <div className="bg-slate-900 p-5 md:p-6 rounded-xl border border-slate-700/50 my-6 shadow-lg transition-all duration-300 hover:shadow-cyan-900/10">
          <h3 className="text-xl font-bold text-amber-400 mb-3 tracking-wide">模擬 3.3-B：去迴旋 (Deconvolution)</h3>
          <p className="text-[1.05rem] leading-relaxed text-slate-300 mb-5">剝離震源波列特徵，使反射訊號「尖銳化」，提升垂直解析度。</p>
          <input type="range" min="0" max="100" value={strength} onChange={(e) => setStrength(Number(e.target.value))} className="w-full mb-6 accent-cyan-500 cursor-pointer" />
          <svg viewBox="0 0 400 60" className="w-full h-24 md:h-32 bg-slate-800 rounded-lg shadow-inner border border-slate-700/50">
            <path d={`M 0 30 Q 20 ${30 - 20*(1-strength/100)} 40 30 T 80 30 T 120 30`} fill="none" stroke="#94a3b8" strokeWidth="2.5" className="transition-all duration-300" />
            {strength > 50 && <line x1="60" y1="10" x2="60" y2="50" stroke="#f43f5e" strokeWidth="2.5" className="opacity-80" />}
            <text x="200" y="35" fill="#f87171" fontSize="14" fontWeight="bold">
              {strength < 20 ? '原始寬波列' : strength > 80 ? '尖銳反射脈衝' : '濾波處理中...'}
            </text>
          </svg>
        </div>
      );
    };

    const Sim34A = () => {
      const [angle, setAngle] = useState(25);
      const R = 150, rCore = 80, cx = 200, cy = 200;
      const rad = (angle * Math.PI) / 180;
      const penetrationDepth = R * Math.sin(rad); 
      const isShadowZone = penetrationDepth < rCore + 10 && penetrationDepth > rCore - 20;
      const hitsCore = penetrationDepth <= rCore;
      return (
        <div className="bg-slate-900 p-5 md:p-6 rounded-xl border border-slate-700/50 my-6 shadow-lg transition-all duration-300 hover:shadow-cyan-900/10">
          <h3 className="text-xl font-bold text-amber-400 mb-3 tracking-wide">模擬 3.4-A：球體波傳與陰影區</h3>
          <p className="text-[1.05rem] leading-relaxed text-slate-300 mb-5">調整射出角度。當波抵達低速外核時急遽偏折，產生 P波陰影區。</p>
          <input type="range" min="15" max="60" value={angle} onChange={(e) => setAngle(Number(e.target.value))} className="w-full mb-6 accent-cyan-500 cursor-pointer" />
          <div className="flex justify-center relative">
            <svg width="300" height="200" viewBox="0 0 400 300" className="bg-slate-800 rounded-lg shadow-inner border border-slate-700/50">
              <circle cx={cx} cy={cy} r={R} fill="#0f172a" stroke="#475569" strokeWidth="2" />
              <circle cx={cx} cy={cy} r={rCore} fill="#b45309" opacity="0.4" stroke="#d97706" />
              <circle cx={cx} cy={cy-R} r="5" fill="#f87171" />
              {hitsCore ? 
                <path d={`M ${cx} ${cy-R} Q ${cx-50} ${cy-rCore/2} ${cx-60} ${cy-rCore}`} fill="none" stroke="#ef4444" strokeWidth="3" className="transition-all duration-300" /> :
                <path d={`M ${cx} ${cy-R} Q ${cx} ${cy-penetrationDepth} ${cx + R*Math.sin(rad*4)} ${cy - R*Math.cos(rad*4)}`} fill="none" stroke="#34d399" strokeWidth="3" className="transition-all duration-300" />
              }
            </svg>
          </div>
        </div>
      );
    };

    const Sim34B = () => {
      const [pos, setPos] = useState(50);
      return (
        <div className="bg-slate-900 p-5 md:p-6 rounded-xl border border-slate-700/50 my-6 shadow-lg transition-all duration-300 hover:shadow-cyan-900/10">
          <h3 className="text-xl font-bold text-amber-400 mb-3 tracking-wide">模擬 3.4-B：三重走時現象 (Triplication)</h3>
          <p className="text-[1.05rem] leading-relaxed text-slate-300 mb-5">波速急遽增加導致走時曲線產生折疊。單一距離可觀測到三個不同路徑的相位。</p>
          <input type="range" min="0" max="100" value={pos} onChange={(e) => setPos(Number(e.target.value))} className="w-full mb-6 accent-cyan-500 cursor-pointer" />
          <svg viewBox="0 0 400 150" className="w-full h-32 md:h-40 bg-slate-800 rounded-lg shadow-inner border border-slate-700/50">
            <path d="M 50 120 C 150 90, 200 80, 250 60 L 150 50 C 200 30, 300 20, 380 10" fill="none" stroke="#06b6d4" strokeWidth="2.5" />
            <line x1={50 + pos*3} y1="0" x2={50 + pos*3} y2="150" stroke="#f43f5e" strokeWidth="2" strokeDasharray="4" className="transition-all duration-300" />
            <text x="10" y="20" fill="#94a3b8" fontSize="12" fontWeight="bold">時間 T</text>
            <text x="350" y="140" fill="#94a3b8" fontSize="12" fontWeight="bold">距離 Δ</text>
          </svg>
        </div>
      );
    };

    // -------------------------------------------------------------
    // 3.5-A 體波命名與動態射線 (能量傳遞版)
    // -------------------------------------------------------------
    const Sim35A = () => {
      const [phase, setPhase] = useState('P');
      const [animKey, setAnimKey] = useState(0); 
      
      const R = 120, rc = 65, ric = 25, cx = 200, cy = 150;
      const sourceY = cy - R + 5;
      
      const paths = {
        P: `M ${cx} ${sourceY} Q ${cx+70} ${cy-10} ${cx+R*0.96} ${cy+R*0.25}`,
        S: `M ${cx} ${sourceY} Q ${cx-70} ${cy-10} ${cx-R*0.96} ${cy+R*0.25}`,
        pP: `M ${cx} ${sourceY} L ${cx-15} ${cy-R+1} Q ${cx-80} ${cy-10} ${cx-R*0.8} ${cy+R*0.6}`,
        sS: `M ${cx} ${sourceY} L ${cx+15} ${cy-R+1} Q ${cx+80} ${cy-10} ${cx+R*0.8} ${cy+R*0.6}`,
        PP: `M ${cx} ${sourceY} Q ${cx+40} ${cy-40} ${cx+R*0.7} ${cy-R*0.7} Q ${cx+110} ${cy+20} ${cx+R*0.5} ${cy+R*0.86}`,
        SS: `M ${cx} ${sourceY} Q ${cx-40} ${cy-40} ${cx-R*0.7} ${cy-R*0.7} Q ${cx-110} ${cy+20} ${cx-R*0.5} ${cy+R*0.86}`,
        PcP: `M ${cx} ${sourceY} Q ${cx+20} ${cy-30} ${cx+30} ${cy-rc} Q ${cx+50} ${cy-30} ${cx+R*0.6} ${cy-R*0.8}`,
        ScS: `M ${cx} ${sourceY} Q ${cx-20} ${cy-30} ${cx-30} ${cy-rc} Q ${cx-50} ${cy-30} ${cx-R*0.6} ${cy-R*0.8}`,
        Pdiff: `M ${cx} ${sourceY} Q ${cx+30} ${cy-60} ${cx+41} ${cy-50} A ${rc} ${rc} 0 0 0 ${cx-41} ${cy-50} Q ${cx-30} ${cy-60} ${cx-R*0.8} ${cy+R*0.6}`,
        PKP: `M ${cx} ${sourceY} L ${cx+25} ${cy-rc} L ${cx+35} ${cy+rc} L ${cx+60} ${cy+R*0.86}`,
        PKiKP: `M ${cx} ${sourceY} L ${cx+15} ${cy-20} L ${cx+R*0.6} ${cy+R*0.8}`,
        PKIKP: `M ${cx} ${sourceY} L ${cx+10} ${cy-rc} L ${cx+5} ${cy-ric} L ${cx} ${cy+ric} L ${cx-10} ${cy+rc} L ${cx-20} ${cy+R}`,
        SKS: `M ${cx} ${sourceY} L ${cx-25} ${cy-rc} L ${cx-35} ${cy+rc} L ${cx-60} ${cy+R*0.86}`
      };
      
      const colors = { 
        P: '#34d399', S: '#f472b6', pP: '#38bdf8', sS: '#818cf8', PP: '#a78bfa', SS: '#e879f9',
        PcP: '#fbbf24', ScS: '#fb923c', Pdiff: '#facc15', PKP: '#ef4444', PKiKP: '#2dd4bf', PKIKP: '#fcd34d', SKS: '#ec4899' 
      };

      const handlePhaseChange = (p) => {
        setPhase(p);
        setAnimKey(prev => prev + 1);
      };

      const getEndPoint = (pathStr) => {
        const numbers = pathStr.match(/[-\d.]+/g);
        if (numbers && numbers.length >= 2) {
          return {
            x: parseFloat(numbers[numbers.length - 2]),
            y: parseFloat(numbers[numbers.length - 1])
          };
        }
        return { x: cx, y: cy };
      };
      const endPoint = getEndPoint(paths[phase]);

      return (
        <div className="bg-slate-900 p-5 md:p-6 rounded-xl border border-slate-700/50 my-6 shadow-xl transition-all duration-300 hover:shadow-cyan-900/10">
          <h3 className="text-xl font-bold text-amber-400 mb-3 flex items-center tracking-wide">
            <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
            模擬 3.5-A：體波命名與動態射線 (能量傳遞版)
          </h3>
          <p className="text-[1.05rem] leading-relaxed text-slate-300 mb-5">請點擊下方波相按鈕：觀察能量自「震源」釋放後，以波陣面形式推進，並在抵達「終點」時激發出強烈的能量衝擊波。</p>
          <div className="flex flex-wrap gap-3 mb-6 justify-center">
            {Object.keys(paths).map(p => (
              <button 
                key={p} 
                onClick={() => handlePhaseChange(p)} 
                className={`px-4 py-2 rounded-full text-sm font-bold transition-all duration-300 ease-out
                  ${phase===p ? 'bg-cyan-500 text-slate-900 shadow-[0_0_15px_rgba(6,182,212,0.8)] scale-110' : 'bg-slate-800 text-slate-300 hover:bg-slate-700 hover:text-white border border-slate-600'}`}
              >
                {p}
              </button>
            ))}
          </div>
          <div className="flex justify-center relative">
            <svg key={`simulation-${animKey}`} width="100%" height="320" viewBox="0 0 400 300" className="bg-slate-950 rounded-lg shadow-inner overflow-hidden border border-slate-800">
              <defs>
                <radialGradient id="mantle-grad" cx="50%" cy="50%" r="50%">
                  <stop offset="70%" stopColor="#1e293b"/>
                  <stop offset="100%" stopColor="#0f172a"/>
                </radialGradient>
                <radialGradient id="outer-core-grad" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor="#9a3412" stopOpacity="0.4"/>
                  <stop offset="100%" stopColor="#ea580c" stopOpacity="0.6"/>
                </radialGradient>
                <radialGradient id="inner-core-grad" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor="#fef08a"/>
                  <stop offset="100%" stopColor="#eab308"/>
                </radialGradient>
                <filter id="wave-glow">
                  <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                  <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
              </defs>

              <circle cx={cx} cy={cy} r={R} fill="url(#mantle-grad)" stroke="#475569" strokeWidth="2" />
              <circle cx={cx} cy={cy} r={rc} fill="url(#outer-core-grad)" stroke="#c2410c" strokeWidth="1.5" strokeDasharray="4" />
              <circle cx={cx} cy={cy} r={ric} fill="url(#inner-core-grad)" />
              
              <text x={cx+R+10} y={cy} fill="#64748b" fontSize="12" fontWeight="bold">地函</text>
              <text x={cx+rc+5} y={cy} fill="#fdba74" fontSize="12" fontWeight="bold">外核</text>
              <text x={cx-12} y={cy+4} fill="#854d0e" fontSize="10" fontWeight="bold">內核</text>

              <path d={paths[phase]} fill="none" stroke={colors[phase]} strokeWidth="1" strokeDasharray="4" opacity="0.2" />

              <circle cx={cx} cy={sourceY} r="5" fill="#ef4444" />
              <text x={cx-14} y={sourceY-12} fill="#fca5a5" fontSize="12" fontWeight="bold">震源</text>
              <g>
                <circle cx={cx} cy={sourceY} r="0" fill="none" stroke="#ef4444" strokeWidth="2.5">
                   <animate attributeName="r" values="0;50" dur="1s" begin="0s" repeatCount="1" fill="freeze" />
                   <animate attributeName="opacity" values="1;0" dur="1s" begin="0s" repeatCount="1" fill="freeze" />
                </circle>
                <circle cx={cx} cy={sourceY} r="0" fill="none" stroke="#ef4444" strokeWidth="1.5">
                   <animate attributeName="r" values="0;40" dur="1s" begin="0.2s" repeatCount="1" fill="freeze" />
                   <animate attributeName="opacity" values="1;0" dur="1s" begin="0.2s" repeatCount="1" fill="freeze" />
                </circle>
              </g>

              <path 
                id="active-ray"
                d={paths[phase]} 
                fill="none" 
                stroke={colors[phase]} 
                strokeWidth="2.5" 
                strokeLinecap="round"
                strokeDasharray="1200"
                strokeDashoffset="1200"
                filter="url(#wave-glow)"
              >
                <animate attributeName="stroke-dashoffset" from="1200" to="0" dur="2.5s" fill="freeze" />
              </path>
              
              <g>
                {[0, 0.15, 0.3].map((delay, index) => (
                  <g key={index} filter="url(#wave-glow)" opacity={1 - index * 0.3}>
                    <path d={`M -${6 + index*4} -${8 + index*3} Q ${4 - index*2} 0, -${6 + index*4} ${8 + index*3}`} fill="none" stroke="#ffffff" strokeWidth={2.5 - index*0.5} strokeLinecap="round" />
                    <animateMotion dur="2.5s" begin={`${delay}s`} fill="freeze" rotate="auto">
                      <mpath href="#active-ray" />
                    </animateMotion>
                    <animate attributeName="opacity" values={`${1 - index * 0.3};0`} dur="0.1s" begin={`${2.5 + delay}s`} fill="freeze" />
                  </g>
                ))}
              </g>

              <g>
                <circle cx={endPoint.x} cy={endPoint.y} r="0" fill="none" stroke={colors[phase]} strokeWidth="3.5" filter="url(#wave-glow)" opacity="0">
                  <animate attributeName="r" values="0;60" dur="1.2s" begin="2.5s" fill="freeze" />
                  <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.1;1" dur="1.2s" begin="2.5s" fill="freeze" />
                </circle>
                <circle cx={endPoint.x} cy={endPoint.y} r="0" fill="none" stroke="#ffffff" strokeWidth="2" filter="url(#wave-glow)" opacity="0">
                  <animate attributeName="r" values="0;40" dur="1s" begin="2.6s" fill="freeze" />
                  <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.1;1" dur="1s" begin="2.6s" fill="freeze" />
                </circle>
                <circle cx={endPoint.x} cy={endPoint.y} r="5" fill="#ffffff" filter="url(#wave-glow)" opacity="0">
                  <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.1;1" dur="1s" begin="2.5s" fill="freeze" />
                </circle>

    const Sim36A = () => {

    const Sim36B = () => {

      const speed = Math.sqrt(vx*vx + vy*vy);
      return (
        <div className="bg-slate-900 p-5 md:p-6 rounded-xl border border-slate-700/50 my-6 shadow-lg transition-all duration-300 hover:shadow-cyan-900/10">

            </svg>

      );

    const Sim37A = () => {
      const [q, setQ] = useState(10);
      const generateDampedWave = () => Array.from({length: 200}).map((_, i) => {
        const x = i * 2;
        const y = 50 + 40 * Math.exp(-i / q) * Math.sin(i * 0.5);
        return `${x},${y}`;
      }).join(' ');
      return (
        <div className="bg-slate-900 p-5 md:p-6 rounded-xl border border-slate-700/50 my-6 shadow-lg transition-all duration-300 hover:shadow-cyan-900/10">

                  <div className="mt-16 pt-8 border-t border-slate-800">
                    <h4 className="text-amber-400 text-2xl font-bold uppercase tracking-widest mb-8 flex items-center">
                      <svg className="w-7 h-7 mr-3 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                      </svg>
                      互動教學動態模擬區
                    </h4>
                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                      {activeContent.simulations.map(simId => renderSimulation(simId))}
                    </div>
                  </div>
                )}

                <div className="mt-16 pt-8 border-t border-slate-800 bg-slate-900/30 p-6 rounded-2xl">
                  <h4 className="text-slate-400 text-sm font-bold uppercase tracking-widest mb-3">章節總結</h4>
                  <p className="text-slate-300 text-[1.05rem] leading-loose italic tracking-wide">
                    {activeContent.conclusion}
                  </p>
                </div>
                
              </div>
            </main>

          </div>
        </div>
      );
    }

    // 將 App 元件渲染至根節點
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
