    const Sim32A = () => {

    const Sim32B = () => {

    const Sim33A = () => {

      const generateCurve = () => Array.from({length: 40}).map((_, i) => {
        const x = i * 10;

      }).join(' ');
      return (
        <div className="bg-slate-900 p-5 md:p-6 rounded-xl border border-slate-700/50 my-6 shadow-lg transition-all duration-300 hover:shadow-cyan-900/10">

    const Sim33B = () => {

    const Sim34A = () => {

                <path d={`M ${cx} ${cy-R} Q ${cx} ${cy-penetrationDepth} ${cx + R*Math.sin(rad*4)} ${cy - R*Math.cos(rad*4)}`} fill="none" stroke="#34d399" strokeWidth="3" className="transition-all duration-300" />

      );
    };

    const Sim35A = () => {
      const [phase, setPhase] = useState('P');
      const [animKey, setAnimKey] = useState(0); 
      
      const R = 120, rc = 65, ric = 25, cx = 200, cy = 150;
      const sourceY = cy - R + 5;
      
      const paths = {
        P: `M ${cx} ${sourceY} Q ${cx+70} ${cy-10} ${cx+R*0.96} ${cy+R*0.25}`,
        S: `M ${cx} ${sourceY} Q ${cx-70} ${cy-10} ${cx-R*0.96} ${cy+R*0.25}`,

        SS: `M ${cx} ${sourceY} Q ${cx-40} ${cy-40} ${cx-R*0.7} ${cy-R*0.7} Q ${cx-110} ${cy+20} ${cx-R*0.5} ${cy+R*0.86}`,

        Pdiff: `M ${cx} ${sourceY} Q ${cx+30} ${cy-60} ${cx+41} ${cy-50} A ${rc} ${rc} 0 0 0 ${cx-41} ${cy-50} Q ${cx-30} ${cy-60} ${cx-R*0.8} ${cy+R*0.6}`,

        const numbers = pathStr.match(/[-\d.]+/g);
        if (numbers && numbers.length >= 2) {
          return {
            x: parseFloat(numbers[numbers.length - 2]),
            y: parseFloat(numbers[numbers.length - 1])
          };
        }
        return { x: cx, y: cy };

      const endPoint = getEndPoint(paths[phase]);

      return (

            模擬 3.5-A：體波命名與動態射線 (能量傳遞版)
          </h3>
          <p className="text-[1.05rem] leading-relaxed text-slate-300 mb-5">點擊波相按鈕：觀察能量自「震源」釋放後，以波陣面形式推進，並在抵達「終點」時激發能量衝擊波。</p>

                  ${phase===p ? 'bg-cyan-500 text-slate-900 shadow-[0_0_15px_rgba(6,182,212,0.8)] scale-110' : 'bg-slate-800 text-slate-300 hover:bg-slate-700 hover:text-white border border-slate-600'}`}

              <circle cx={cx} cy={cy} r={rc} fill="url(#outer-core-grad)" stroke="#c2410c" strokeWidth="1.5" strokeDasharray="4" />
              <circle cx={cx} cy={cy} r={ric} fill="url(#inner-core-grad)" />
              
              <text x={cx+R+10} y={cy} fill="#64748b" fontSize="12" fontWeight="bold">地函</text>

    const Sim36B = () => {

                      </h3>
                      {/* 渲染帶有 HTML 排版的文字與公式 */}
                      <div 
                        className="text-slate-200/90 leading-loose space-y-4 text-[1.05rem] md:text-lg tracking-wide whitespace-pre-wrap"
                        dangerouslySetInnerHTML={{ __html: sec.content }}
                      ></div>
                      
                      {/* 直接將圖譜渲染於對應文字下方 */}
                      {sec.images && sec.images.length > 0 && (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-10">
                          {sec.images.map((img, i) => (
                            <figure key={i} className="bg-slate-900/80 p-5 rounded-2xl border border-slate-700/60 shadow-xl flex flex-col h-full transition-all duration-300 hover:shadow-cyan-900/20 hover:border-slate-600">
                              <div className="w-full h-72 flex items-center justify-center bg-slate-800/80 rounded-xl mb-5 overflow-hidden shadow-inner border border-slate-700/50">
                                <img 
                                  src={img.src} 
                                  alt={img.alt} 
                                  className="max-w-full max-h-full object-contain p-2 hover:scale-[1.02] transition-transform duration-500" 
                                  loading="lazy" 
                                />
                              </div>
                              <figcaption className="text-base text-slate-300 leading-relaxed mt-auto border-t border-slate-700/50 pt-4 font-medium tracking-wide">
                                {img.desc}
                              </figcaption>
                            </figure>
                          ))}
                        </div>
                      )}
                    </section>
                  ))}
                </div>

                {activeContent.simulations && activeContent.simulations.length > 0 && (
                  <div className="mt-16 pt-8 border-t border-slate-800">
                    <h4 className="text-amber-400 text-2xl font-bold uppercase tracking-widest mb-8 flex items-center">
                      <svg className="w-7 h-7 mr-3 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                      </svg>
                      互動教學動態模擬區
                    </h4>
                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                      {activeContent.simulations.map(simId => renderSimulation(simId))}
                    </div>
                  </div>
                )}

                <div className="mt-16 pt-8 border-t border-slate-800 bg-slate-900/30 p-6 rounded-2xl">
                  <h4 className="text-slate-400 text-sm font-bold uppercase tracking-widest mb-3">章節總結</h4>
                  <p className="text-slate-300 text-[1.05rem] leading-loose italic tracking-wide">
                    {activeContent.conclusion}
                  </p>
                </div>
                
              </div>
            </main>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
